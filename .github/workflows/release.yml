name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag matches version
        run: |
          VERSION="$(grep -o '"[0-9.]*"' src/version.ts | tr -d '"')"
          TAG="${GITHUB_REF_NAME}"
          EXPECTED="v${VERSION}"
          if [[ "$TAG" != "$EXPECTED" ]]; then
            echo "Tag ${TAG} does not match src/version.ts (${EXPECTED})." >&2
            exit 1
          fi

      - name: Build release artifacts
        run: |
          mkdir -p dist
          bun build ./src/index.ts --target=bun --minify --outfile dist/senv-bun
          chmod +x dist/senv-bun
          bun build ./src/index.ts --compile --minify --target=bun-darwin-arm64 --outfile dist/senv-darwin-arm64
          bun build ./src/index.ts --compile --minify --target=bun-darwin-x64-baseline --outfile dist/senv-darwin-x64
          bun build ./src/index.ts --compile --minify --target=bun-linux-x64-baseline --outfile dist/senv-linux-x64
          bun build ./src/index.ts --compile --minify --target=bun-linux-arm64 --outfile dist/senv-linux-arm64

      - name: Smoke test binaries
        run: |
          dist/senv-bun -V 2>&1 | grep -q "Secure ENV (senv)"
          dist/senv-linux-x64 -V 2>&1 | grep -q "Secure ENV (senv)"
          for bin in dist/senv-darwin-arm64 dist/senv-darwin-x64 dist/senv-linux-arm64; do
            test -s "$bin"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum senv-* > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/senv-bun
            dist/senv-darwin-arm64
            dist/senv-darwin-x64
            dist/senv-linux-x64
            dist/senv-linux-arm64
            dist/checksums.sha256
