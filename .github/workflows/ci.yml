name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests with coverage
        run: bun test --coverage --coverage-reporter=lcov

      - name: Update coverage badge
        run: |
          mkdir -p badges
          read -r FOUND HIT < <(awk '
            /^LF:/ { found += substr($0, 4) + 0 }
            /^LH:/ { hit += substr($0, 4) + 0 }
            END { print found, hit }
          ' coverage/lcov.info)
          if [ "$FOUND" -eq 0 ]; then
            echo "No coverage data in coverage/lcov.info" >&2
            exit 1
          fi
          PCT=$(( (HIT * 100 + FOUND / 2) / FOUND ))
          if [ "$PCT" -ge 90 ]; then
            COLOR="brightgreen"
          elif [ "$PCT" -ge 75 ]; then
            COLOR="green"
          elif [ "$PCT" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          printf '%s\n' \
            '{' \
            '  "schemaVersion": 1,' \
            '  "label": "coverage",' \
            "  \"message\": \"${PCT}%\"," \
            "  \"color\": \"${COLOR}\"" \
            '}' \
            > badges/coverage.json

      - name: Commit coverage badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.json
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push
